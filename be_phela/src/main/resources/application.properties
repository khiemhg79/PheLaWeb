# ===================================================================
# CORE CONFIGURATION (FOR RENDER DEPLOYMENT)
# ===================================================================
# Database Configuration - These values will be read from Render's Environment Variables
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:phela}?prepareThreshold=0
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.auto-commit=false

# Custom individual variables to inject into PgVectorEmbeddingStore builder
db.host=${DB_HOST:localhost}
db.port=${DB_PORT:5432}
db.name=${DB_NAME:phela}

# PostgreSQL-specific: Ensure zero date values (handled differently in Postgres)
# spring.datasource.hikari.data-source-properties.zeroDateTimeBehavior=convertToNull

# Hibernate Configuration for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# Server Port - Render provides this automatically
server.port=${PORT:8081}

# JWT Secret Key for Admin internal token (MUST be at least 64 characters for HS512)
jwt.signer-key=${JWT_SIGNER_KEY:someverylongsecretkeyforphelacoffeeadmin2024abcdef_must_be_64_chars_long}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:18}
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dbtofjbgpskxvoxaqckm.supabase.co/auth/v1
# Supabase JWT Secret - used to verify Supabase-issued tokens (from Supabase Project Settings > API)
supabase.jwt-secret=${SUPABASE_JWT_SECRET:}

spring.main.lazy-initialization=true

# ===================================================================
# OTHER CONFIGURATIONS
# ===================================================================
# Application Configuration
app.base-url=${APP_BASE_URL:https://phela-backend-dyl7.onrender.com}

frontend.customer-url=${FRONTEND_CUSTOMER_URL:http://localhost:3001}
frontend.admin-url=${FRONTEND_ADMIN_URL:http://localhost:3000}



# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,https://phela-customer-w519.onrender.com,https://phela-admin.onrender.com}

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# PayOS Configuration
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.return-url=${PAYOS_RETURN_URL:}
payos.cancel-url=${PAYOS_CANCEL_URL:}

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
# Standard Redirect URI for Spring Security OAuth2
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# SePay Configuration
sepay.api-key=${SEPAY_API_KEY:default_secret}
bank.id=${BANK_ID:tpbank}
bank.account-no=${BANK_ACCOUNT_NO:0827592304}
bank.account-name=${BANK_ACCOUNT_NAME:Phe La Coffee}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Multipart Upload Limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===================================================================
# AI & GROQ CONFIGURATIONS
# ===================================================================
groq.api.key=${GROQ_API_KEY:}
